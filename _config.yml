# Basic site settings
locale: "en-US"
title: "Shouchen Zhou"
title_separator: "-"
name: "Shouchen Zhou"
description: "A master's student at Tsinghua University"
url: "https://zsc2003.github.io"
baseurl: ""
repository: "zsc2003/zsc2003.github.io"

# Author profile shown in the left sidebar
author:
  avatar: "profile.png"
  name: "Shouchen Zhou"
  pronouns: "he/his"
  bio: "I am a master's student in Mathematics at Tsinghua University. I received my B.S. in Computer Science from ShanghaiTech University."
  location: "Beijing, China"
  email: "zhousc25@mails.tsinghua.edu.cn"
  googlescholar: "https://scholar.google.com/citations?user=6D6uyxAAAAAJ"
  orcid: "https://orcid.org/0009-0005-9396-0055"
  github: "zsc2003"

# Publication categories and headings shown on the Publications page
publication_category:
  conferences:
    title: "Conference Papers"

# Site behavior
teaser:
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"

# Files included in the generated site
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "

"
incremental: false
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections actually used by this personal site
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/

# Defaults for pages and collections
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Output
permalink: /:categories/:title/
timezone: Etc/UTC

# GitHub Pages compatible plugins used by this site
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji
whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji

# HTML compression
compress_html:
  clippings: all
  ignore:
    envs: development
